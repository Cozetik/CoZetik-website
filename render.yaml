services:
  - type: web
    name: cozetik-ai-services
    runtime: python
    plan: free
    region: frankfurt
    rootDir: ai_services
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: MISTRAL_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.12.7"
